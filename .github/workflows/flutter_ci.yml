name: Flutter CI

on:
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Flutter (siempre compatible con Dart)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. Verify versions (debug útil)
      - name: Check Flutter version
        run: flutter --version

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Generate code (freezed, drift, json_serializable)
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # 6. Analyze (estricto)
      - name: Analyze project
        run:  flutter analyze

      # 7. Run tests with coverage
      - name: Run tests
        run: flutter test --coverage
